<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mordheim Map Preview</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #1a1a2e; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #ccc;
      font-family: monospace;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 4px;
    }
    #grid-toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      font-family: monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.7);
      color: #ccc;
      border: 1px solid #555;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    #grid-toggle.active { color: #7af; border-color: #7af; }
  </style>
</head>
<body>
  <div id="info">Loading map... (drag to rotate, scroll to zoom)</div>
  <button id="grid-toggle" title="Toggle 3D collision grid [G]">Grid [G]</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(40, 40, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(24, 5, 24);
    controls.update();

    // 2D floor grid
    const grid = new THREE.GridHelper(48, 48, 0x444444, 0x222222);
    grid.position.set(24, -0.01, 24);
    scene.add(grid);

    // Load the generated model
    const loader = new GLTFLoader();
    loader.load('/model.glb', (gltf) => {
      scene.add(gltf.scene);

      let meshCount = 0, triCount = 0;
      gltf.scene.traverse((child) => {
        if (child.isMesh) {
          meshCount++;
          const geo = child.geometry;
          triCount += geo.index ? geo.index.count / 3 : geo.attributes.position.count / 3;
          child.material.transparent = true;
          child.material.opacity = 0.35;
        }
      });

      document.getElementById('info').textContent =
        `Meshes: ${meshCount} | Triangles: ${Math.round(triCount)} | Drag to rotate, scroll to zoom`;
    }, undefined, (err) => {
      document.getElementById('info').textContent = `Error loading model: ${err.message}`;
    });

    // --- 3D collision grid ---
    let collisionGridGroup = null;
    let gridVisible = false;

    async function loadCollisionGrid() {
      if (collisionGridGroup) return; // already loaded
      try {
        const res = await fetch('/geometry.json');
        if (!res.ok) return;
        const data = await res.json();
        const cm = data.collisionMatrix;
        if (!cm) return;

        const { W, D, maxY, ox, oz, cellSize, cells } = cm;

        // --- Full wireframe cage (grey grid lines across entire volume) ---
        const gridPos = [];
        for (let cy = 0; cy <= maxY; cy++) {
          for (let cz = 0; cz <= D; cz++) {
            const y = cy * cellSize, z = oz + cz * cellSize;
            gridPos.push(ox, y, z, ox + W * cellSize, y, z);
          }
        }
        for (let cy = 0; cy <= maxY; cy++) {
          for (let cx = 0; cx <= W; cx++) {
            const y = cy * cellSize, x = ox + cx * cellSize;
            gridPos.push(x, y, oz, x, y, oz + D * cellSize);
          }
        }
        for (let cz = 0; cz <= D; cz++) {
          for (let cx = 0; cx <= W; cx++) {
            const x = ox + cx * cellSize, z = oz + cz * cellSize;
            gridPos.push(x, 0, z, x, maxY * cellSize, z);
          }
        }
        const cageGeo = new THREE.BufferGeometry();
        cageGeo.setAttribute('position', new THREE.Float32BufferAttribute(gridPos, 3));
        const cageMat = new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.2 });

        // --- Occupied cells (red cube wireframes) ---
        const redPos = [];
        const CUBE_EDGES = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
        for (let cy = 0; cy < maxY; cy++) {
          for (let cz = 0; cz < D; cz++) {
            for (let cx = 0; cx < W; cx++) {
              if (!cells[cx + cz * W + cy * W * D]) continue;
              const x = ox + cx * cellSize, y = cy * cellSize, z = oz + cz * cellSize, s = cellSize;
              const c = [
                [x,   y,   z  ], [x+s, y,   z  ], [x,   y,   z+s], [x+s, y,   z+s],
                [x,   y+s, z  ], [x+s, y+s, z  ], [x,   y+s, z+s], [x+s, y+s, z+s],
              ];
              for (const [a, b] of CUBE_EDGES) redPos.push(...c[a], ...c[b]);
            }
          }
        }
        const redGeo = new THREE.BufferGeometry();
        redGeo.setAttribute('position', new THREE.Float32BufferAttribute(redPos, 3));
        const redMat = new THREE.LineBasicMaterial({ color: 0xff2200, transparent: true, opacity: 0.8 });

        collisionGridGroup = new THREE.Group();
        collisionGridGroup.add(new THREE.LineSegments(cageGeo, cageMat));
        collisionGridGroup.add(new THREE.LineSegments(redGeo, redMat));
        collisionGridGroup.visible = false;
        scene.add(collisionGridGroup);
      } catch (e) {
        console.warn('Could not load collision grid:', e);
      }
    }

    function toggleGrid() {
      loadCollisionGrid().then(() => {
        if (!collisionGridGroup) return;
        gridVisible = !gridVisible;
        collisionGridGroup.visible = gridVisible;
        document.getElementById('grid-toggle').classList.toggle('active', gridVisible);
      });
    }

    document.getElementById('grid-toggle').addEventListener('click', toggleGrid);
    window.addEventListener('keydown', (e) => { if (e.key === 'g' || e.key === 'G') toggleGrid(); });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
